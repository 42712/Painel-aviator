<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betou Coletor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 280px; font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f1a; color: #fff; padding: 12px; }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .header h1 { font-size: 14px; font-weight: 700; color: #349CFF; }
    .version { font-size: 9px; background: #1a1a2e; padding: 2px 6px; border-radius: 4px; color: #888; }
    .status { display: flex; align-items: center; gap: 6px; padding: 8px; background: #1a1a2e; border-radius: 6px; margin-bottom: 8px; font-size: 12px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
    .status-dot.on { background: #00ff88; box-shadow: 0 0 6px #00ff8866; }
    .info { font-size: 11px; color: #aaa; }
    .info span { color: #fff; font-weight: 600; }
    .footer { font-size: 9px; color: #555; text-align: center; margin-top: 12px; padding-top: 8px; border-top: 1px solid #1a1a2e; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎯 Betou Coletor</h1>
    <span class="version">v4.3</span>
  </div>
  <div class="status" id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Iniciando...</span>
  </div>
  <div class="info">
    Rodadas enviadas: <span id="totalEnviadas">0</span><br>
    Abas abertas: <span id="abasAbertas">0</span>
  </div>
  <div class="footer">Painel Aviator SaaS</div>

  <script>
    function atualizar(msg) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      const conectada = msg.conectada;
      dot.className = 'status-dot' + (conectada ? ' on' : '');
      text.textContent = conectada ? 'Conectado' : 'Aguardando...';
      document.getElementById('totalEnviadas').textContent = msg.totalEnviadas || 0;
      document.getElementById('abasAbertas').textContent = msg.abasAbertas || 0;
    }

    chrome.runtime.sendMessage({ tipo: 'getStatus' }, (r) => {
      if (r) atualizar(r);
    }).catch(() => {
      document.getElementById('statusText').textContent = 'Erro de conexão';
    });

    chrome.runtime.onMessage.addListener((msg) => {
      if (msg.tipo === 'statusAtualizado') atualizar(msg);
    });
  </script>
</body>
</html>
