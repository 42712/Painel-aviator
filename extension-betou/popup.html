<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Aviator Betou</title>
<style>
  :root {
    --bg: #0a0e17;
    --bg2: #111827;
    --bg3: #1a2538;
    --green: #00e676;
    --red: #ff3d57;
    --muted: #4a6072;
    --text: #cdd8e3;
    --radius: 10px;
    --azul: #349CFF;
    --roxa: #913EF8;
    --rosa: #FF2D95;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    width: 340px;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .header {
    background: linear-gradient(135deg, #0a1f33, #0e2a42);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #1a3048;
  }
  .header-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--green), #009688);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .header-title { font-size: 17px; font-weight: 700; color: #fff; }
  .header-sub { font-size: 10px; color: var(--muted); }
  .header-ver { margin-left: auto; font-size: 10px; color: var(--muted); background: var(--bg3); padding: 2px 10px; border-radius: 20px; border: 1px solid #1e3550; }

  .body { padding: 12px; }
  .section { background: var(--bg2); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; border: 1px solid #1a2a3e; }

  /* Status row */
  .sr { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .sr:last-child { border-bottom: none; }
  .sr-l { font-size: 12px; color: var(--muted); }
  .sr-r { font-size: 13px; font-weight: 600; }

  /* Vela */
  .vela-wrap {
    text-align: center;
    padding: 10px 0 6px;
  }
  .vela-valor {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: 1px;
    font-family: 'Courier New', monospace;
  }
  .vela-valor.c-azul { color: var(--azul); }
  .vela-valor.c-roxa { color: var(--roxa); }
  .vela-valor.c-rosa { color: var(--rosa); }
  .vela-valor.c-none { color: #fff; }

  .vela-info {
    display: flex;
    justify-content: center;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }
  .vela-info strong { color: var(--text); font-weight: 500; }

  /* Config */
  .campo { margin-bottom: 8px; }
  .campo:last-child { margin-bottom: 0; }
  .campo label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .campo input, .campo select {
    width: 100%;
    padding: 8px 10px;
    background: #0a1725;
    border: 1px solid #1e3550;
    border-radius: 6px;
    color: #fff;
    font-size: 13px;
    outline: none;
  }
  .campo input:focus, .campo select:focus { border-color: var(--green); }
  .campo select option { background: #0a1725; color: #fff; }

  .btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, var(--azul), var(--roxa));
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn:active { opacity: .8; }

  .salvo { font-size: 11px; color: var(--green); text-align: center; opacity: 0; transition: opacity .3s; margin-top: 6px; }
  .salvo.show { opacity: 1; }

  .footer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding-top: 10px;
    border-top: 1px solid #1a2a3e;
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-icon">✈</div>
  <div>
    <div class="header-title">Aviator Betou</div>
    <div class="header-sub">Captura de rodadas • v4.0</div>
  </div>
  <div class="header-ver">v4.0</div>
</div>

<div class="body">
  <!-- Status -->
  <div class="section">
    <div class="sr">
      <span class="sr-l">Conexão</span>
      <span class="sr-r" id="cx">🔴 Aguardando...</span>
    </div>
    <div class="vela-wrap">
      <div class="vela-valor c-none" id="velaValor">—</div>
      <div class="vela-info" id="velaInfo">
        <span>Rodada: <strong id="rId">—</strong></span>
        <span>Hora: <strong id="rHora">—</strong></span>
        <span>Soma: <strong id="rSoma">—</strong></span>
      </div>
    </div>
    <div class="sr">
      <span class="sr-l">Enviadas</span>
      <span class="sr-r" id="enviadas" style="color:var(--green)">0</span>
    </div>
    <div class="sr">
      <span class="sr-l">Erros</span>
      <span class="sr-r" id="erros" style="color:var(--red)">0</span>
    </div>
  </div>

  <!-- Config -->
  <div class="section">
    <div class="campo">
      <label>Token do Cliente</label>
      <input type="text" id="token" placeholder="Seu token...">
    </div>
    <div class="campo">
      <label>Painel</label>
      <select id="painel">
        <option value="1">Aviator 1</option>
        <option value="2">Aviator 2</option>
      </select>
    </div>
    <button class="btn" id="btnSalvar">💾 Salvar Config</button>
    <div class="salvo" id="salvoMsg">✓ Configuração salva!</div>
  </div>

  <div class="footer">
    <span id="abasInfo">Abas Betou abertas: 0</span>
  </div>
</div>

<script>
(function() {
  const cx = document.getElementById('cx');
  const velaValor = document.getElementById('velaValor');
  const rId = document.getElementById('rId');
  const rHora = document.getElementById('rHora');
  const rSoma = document.getElementById('rSoma');
  const enviadas = document.getElementById('enviadas');
  const erros = document.getElementById('erros');
  const abasInfo = document.getElementById('abasInfo');
  const inputToken = document.getElementById('token');
  const selectPainel = document.getElementById('painel');
  const btnSalvar = document.getElementById('btnSalvar');
  const salvoMsg = document.getElementById('salvoMsg');

  // Load config
  chrome.storage.sync.get(['token','painel'], (c) => {
    if (c.token) inputToken.value = c.token;
    if (c.painel) selectPainel.value = String(c.painel);
  });

  // Save config
  btnSalvar.addEventListener('click', () => {
    chrome.storage.sync.set({
      token: inputToken.value.trim() || 'default',
      painel: parseInt(selectPainel.value)
    }, () => {
      salvoMsg.classList.add('show');
      setTimeout(() => salvoMsg.classList.remove('show'), 2000);
    });
  });

  // Update UI
  function atualizar(s) {
    cx.textContent = s.conectada ? '🟢 Betou conectada' : '🔴 Aguardando...';
    cx.style.color = s.conectada ? '#00e676' : '#ff3d57';

    if (s.ultimaVela && s.ultimaVela !== '—') {
      velaValor.textContent = s.ultimaVela;
      const val = parseFloat(s.ultimaVela);
      velaValor.className = 'vela-valor';
      if (val < 2) velaValor.classList.add('c-azul');
      else if (val < 10) velaValor.classList.add('c-roxa');
      else velaValor.classList.add('c-rosa');
    }

    if (s.ultimaRodada) {
      rId.textContent = '#' + s.ultimaRodada.rodada;
      rHora.textContent = s.ultimaRodada.timestamp;
      rSoma.textContent = s.ultimaRodada.soma;
    }

    if (s.totalEnviadas !== undefined) enviadas.textContent = s.totalEnviadas;
    if (s.totalErros !== undefined) erros.textContent = s.totalErros;
    if (s.abasAbertas !== undefined) abasInfo.textContent = 'Abas Betou abertas: ' + s.abasAbertas;
  }

  chrome.runtime.onMessage.addListener((msg) => {
    if (msg.tipo === 'statusAtualizado') atualizar(msg);
  });

  chrome.runtime.sendMessage({ tipo: 'getStatus' });
})();
</script>
</body>
</html>
