<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhe do Cliente - Painel Aviator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-4">
        <h1>Detalhe do Cliente</h1>
        <div class="card mt-3">
            <div class="card-body">
                <h5 class="card-title">{{ cliente.nome }}</h5>
                <p class="card-text"><strong>Email:</strong> {{ cliente.email }}</p>
                <p class="card-text"><strong>Token:</strong> {{ cliente.token }}</p>
                <p class="card-text"><strong>Status:</strong> {{ 'Ativo' if not cliente.bloqueado else 'Bloqueado' }}</p>
                <p class="card-text"><strong>Saldo:</strong> R$ {{ "%.2f"|format(cliente.saldo) }}</p>
            </div>
        </div>
        <a href="/admin/clientes" class="btn btn-secondary mt-3">Voltar</a>
    </div>
</body>
</html>
