<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Aviator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0F0F1A;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-logo h1 {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #349CFF, #913EF8, #FF2D95);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #888;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .status-dot.disconnected { background: #ff4444; animation: none; }

        /* Container Principal */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px;
        }

        /* Aviator Tabs */
        .aviator-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            background: #1a1a2e;
            border-radius: 14px;
            padding: 6px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .aviator-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .aviator-btn:hover { color: #aaa; background: rgba(255,255,255,0.03); }
        .aviator-btn.ativo {
            background: linear-gradient(135deg, rgba(52,156,255,0.2), rgba(145,62,248,0.2));
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .av-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .av-indicator.av-1 { background: #349CFF; }
        .av-indicator.av-2 { background: #913EF8; }

        /* Timer */
        .timer-bar {
            text-align: center;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
            color: #888;
        }
        .timer-bar .timer-num {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            display: inline-block;
            min-width: 60px;
        }
        .timer-bar .timer-num.urgente { color: #FF2D55; animation: timerPulse 0.5s infinite; }
        @keyframes timerPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .timer-bar .timer-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; }

        /* Últimas Rodadas */
        .ultimas-live {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .vela-card {
            flex: 1;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s;
        }
        .vela-card .label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .vela-card .rodada-num { font-size: 13px; color: #888; margin-bottom: 8px; }
        .vela-card .multiplicador { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
        .vela-card .soma { font-size: 14px; color: #aaa; }
        .vela-card .soma span { display: inline-block; background: rgba(255,255,255,0.08); padding: 2px 10px; border-radius: 8px; font-weight: 700; font-size: 16px; }
        .vela-card.penultima { opacity: 0.7; transform: scale(0.95); }
        .vela-card .vazio { color: #444; font-size: 14px; padding: 20px 0; }

        /* Gráfico */
        .chart-container {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            height: 400px;
            position: relative;
        }
        .chart-container canvas { width: 100% !important; height: 100% !important; }

        /* Catálogo */
        .catalogo-container {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .catalogo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .catalogo-header h2 { font-size: 18px; font-weight: 700; }
        .catalogo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 6px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .catalogo-grid::-webkit-scrollbar { width: 4px; }
        .catalogo-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        .vela-mini {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 10px;
            background: #12121e;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .vela-mini:hover {
            transform: scale(1.4) !important;
            z-index: 20;
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        .vela-mini .mult { font-weight: 800; font-size: 12px; }
        .vela-mini .rodada { font-size: 8px; color: #666; }
        .vela-mini .soma-tag { font-size: 9px; font-weight: 700; margin-top: 1px; }

        /* Filtros */
        .filtros-container {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .filtros-botoes { display: flex; gap: 10px; flex-wrap: wrap; }
        .filtro-btn {
            padding: 10px 24px;
            border: 2px solid transparent;
            border-radius: 25px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            background: #12121e;
            color: #888;
        }
        .filtro-btn:hover { transform: translateY(-2px); }
        .filtro-btn.ativo { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .filtro-btn.todas { border-color: #555; color: #fff; }
        .filtro-btn.todas.ativo { background: #555; }
        .filtro-btn.azul { border-color: #349CFF; color: #349CFF; }
        .filtro-btn.azul.ativo { background: #349CFF; color: #fff; }
        .filtro-btn.roxa { border-color: #913EF8; color: #913EF8; }
        .filtro-btn.roxa.ativo { background: #913EF8; color: #fff; }
        .filtro-btn.rosa { border-color: #FF2D95; color: #FF2D95; }
        .filtro-btn.rosa.ativo { background: #FF2D95; color: #fff; }
        .contagem-filtro { margin-top: 12px; font-size: 13px; color: #666; }

        /* Histórico */
        .historico-container {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .historico-container h2 { font-size: 18px; font-weight: 700; margin-bottom: 15px; }
        .historico-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 6px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .historico-grid::-webkit-scrollbar { width: 4px; }
        .historico-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        .vela-historico {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: #12121e;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .vela-historico:hover {
            transform: scale(1.2) !important;
            z-index: 20;
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        .vela-historico .mult-h { font-weight: 800; font-size: 13px; }
        .vela-historico .rodada-h { font-size: 9px; color: #666; }
        .vela-historico .soma-h { font-size: 10px; font-weight: 700; margin-top: 2px; opacity: 0.7; }
        .vela-historico.selecionada {
            outline: 2px solid rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        /* Stats bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-card .numero { font-size: 22px; font-weight: 800; }
        .stat-card .rotulo { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card.azul .numero { color: #349CFF; }
        .stat-card.roxa .numero { color: #913EF8; }
        .stat-card.rosa .numero { color: #FF2D95; }

        /* Avião Scroll-to-Top */
        #scrollTopBtn {
            position: fixed;
            bottom: 25px;
            left: 25px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #349CFF, #913EF8);
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(145,62,248,0.4);
            transition: all 0.3s;
        }
        #scrollTopBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(145,62,248,0.6);
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .ultimas-live { flex-direction: column; }
            .chart-container { height: 250px; }
            .stats-bar { grid-template-columns: repeat(3, 1fr); gap: 5px; }
            .stat-card .numero { font-size: 16px; }
            .catalogo-grid { grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); }
            .vela-mini .mult { font-size: 10px; }
            .header-logo h1 { font-size: 16px; }
            .aviator-btn { font-size: 12px; padding: 10px 12px; }
            #scrollTopBtn { width: 42px; height: 42px; font-size: 20px; bottom: 15px; left: 15px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-logo">
            <h1>✈️ PAINEL AVIATOR</h1>
        </div>
        <div class="header-status">
            <span id="extensaoStatus" style="margin-right:15px;font-size:12px;">📱 Extensão: <span style="color:#666">—</span></span>
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Conectando...</span>
        </div>
    </div>

    <div class="main-container">
        <!-- Aviator Tabs -->
        <div class="aviator-tabs">
            <button class="aviator-btn ativo" data-aviator="1" onclick="selecionarAviator(1)">
                <span class="av-indicator av-1"></span> Aviator 1
            </button>
            <button class="aviator-btn" data-aviator="2" onclick="selecionarAviator(2)">
                <span class="av-indicator av-2"></span> Aviator 2
            </button>
        </div>

        <!-- Timer -->
        <div class="timer-bar">
            <div class="timer-label">⏱ PRÓXIMA RODADA</div>
            <span class="timer-num" id="timerTexto">--</span>
        </div>

        <!-- Stats -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-card azul">
                <div class="numero" id="statAzul">0%</div>
                <div class="rotulo">Azul (1.00-1.99x)</div>
            </div>
            <div class="stat-card roxa">
                <div class="numero" id="statRoxa">0%</div>
                <div class="rotulo">Roxa (2.00-9.99x)</div>
            </div>
            <div class="stat-card rosa">
                <div class="numero" id="statRosa">0%</div>
                <div class="rotulo">Rosa (10.00x+)</div>
            </div>
        </div>

        <!-- Últimas Rodadas -->
        <div class="ultimas-live">
            <div class="vela-card" id="ultimaVela">
                <div class="label">🔴 AO VIVO - ÚLTIMA</div>
                <div class="rodada-num" id="ultimaRodada">Aguardando...</div>
                <div class="multiplicador" id="ultimaMult" style="color: #555;">---</div>
                <div class="soma">Soma: <span id="ultimaSoma">-</span></div>
            </div>
            <div class="vela-card penultima" id="penultimaVela">
                <div class="label">⬇️ PENÚLTIMA</div>
                <div class="rodada-num" id="penultimaRodada">Aguardando...</div>
                <div class="multiplicador" id="penultimaMult" style="color: #555;">---</div>
                <div class="soma">Soma: <span id="penultimaSoma">-</span></div>
            </div>
        </div>

        <!-- Gráfico Aviator 1 -->
        <div class="chart-container" id="chartContainer1">
            <canvas id="aviatorChart1"></canvas>
        </div>

        <!-- Gráfico Aviator 2 -->
        <div class="chart-container" id="chartContainer2" style="display:none;">
            <canvas id="aviatorChart2"></canvas>
        </div>

        <!-- Catálogo -->
        <div class="catalogo-container">
            <div class="catalogo-header">
                <h2>📊 Catálogo de Velas</h2>
                <span style="font-size: 12px; color: #666;" id="totalCatalogo">0 velas</span>
            </div>
            <div class="catalogo-grid" id="catalogoGrid"></div>
        </div>

        <!-- Filtros -->
        <div class="filtros-container">
            <div class="filtros-botoes">
                <button class="filtro-btn todas ativo" onclick="filtrar('todas')">🔵 Todas</button>
                <button class="filtro-btn azul" onclick="filtrar('azul')">🔵 Azuis</button>
                <button class="filtro-btn roxa" onclick="filtrar('roxa')">🟣 Roxas</button>
                <button class="filtro-btn rosa" onclick="filtrar('rosa')">🩷 Rosas</button>
            </div>
            <div class="contagem-filtro">
                <span id="contagemHistorico">0 velas carregadas</span>
            </div>
        </div>

        <!-- Histórico -->
        <div class="historico-container">
            <h2>📜 Histórico</h2>
            <div class="historico-grid" id="historicoGrid"></div>
        </div>
    </div>

    <!-- Avião Scroll-to-Top -->
    <button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">✈️</button>

    <script>
        // ===== CONFIG =====
        const CORES = {
            azul: { min: 1.00, max: 1.99, hex: '#349CFF', rgb: 'rgb(52, 156, 255)' },
            roxa: { min: 2.00, max: 9.99, hex: '#913EF8', rgb: 'rgb(145, 62, 248)' },
            rosa: { min: 10.00, max: 9999, hex: '#FF2D95', rgb: 'rgb(255, 45, 149)' }
        };

        // ===== ESTADO =====
        let todasVelas1 = [];
        let todasVelas2 = [];
        let filtroAtivo = 'todas';
        let aviatorAtivo = 1;
        let chart1 = null;
        let chart2 = null;
        let ultimoTimestamp1 = Date.now();
        let ultimoTimestamp2 = Date.now();

        // ===== HELPERS =====
        function getVelasAtivas() { return aviatorAtivo === 1 ? todasVelas1 : todasVelas2; }
        function getChartAtivo() { return aviatorAtivo === 1 ? chart1 : chart2; }

        function classificarCor(mult) {
            if (mult >= 1.00 && mult <= 1.99) return 'azul';
            if (mult >= 2.00 && mult <= 9.99) return 'roxa';
            return 'rosa';
        }

        function calcularSoma(mult) {
            const s = mult.toFixed(2);
            let soma = 0;
            for (const c of s) {
                if (c >= '0' && c <= '9') soma += parseInt(c);
            }
            return soma;
        }

        function aplicarGlow(el, hex) {
            el.style.textShadow = '0 0 7px ' + hex + ', 0 0 20px ' + hex + ', 0 0 40px ' + hex + ', 0 0 80px ' + hex;
        }

        // ===== AVIATOR SWITCH =====
        function selecionarAviator(n) {
            aviatorAtivo = n;
            document.querySelectorAll('.aviator-btn').forEach(b => b.classList.remove('ativo'));
            document.querySelector('.aviator-btn[data-aviator="' + n + '"]').classList.add('ativo');
            document.getElementById('chartContainer1').style.display = n === 1 ? 'block' : 'none';
            document.getElementById('chartContainer2').style.display = n === 2 ? 'block' : 'none';
            renderizarTudo();
        }

        // ===== SSE =====
        const evtSource = new EventSource('/api/stream');

        evtSource.addEventListener('conectado', () => {
            document.getElementById('statusDot').className = 'status-dot';
            document.getElementById('statusText').textContent = '🟢 Conectado';
        });

        function configurarSSE() {
            for (let n = 1; n <= 2; n++) {
                const s = n === 1 ? '1' : '2';
                evtSource.addEventListener('ultima_rodada_' + s, (function(num) {
                    return function(e) { atualizarVelaUI(num, 'ultima', JSON.parse(e.data)); };
                })(n));
                evtSource.addEventListener('penultima_rodada_' + s, (function(num) {
                    return function(e) { atualizarVelaUI(num, 'penultima', JSON.parse(e.data)); };
                })(n));
                evtSource.addEventListener('nova_rodada_' + s, (function(num) {
                    return function(e) {
                        const dados = JSON.parse(e.data);
                        const arr = num === 1 ? todasVelas1 : todasVelas2;
                        arr.push(dados);
                        if (num === 1) ultimoTimestamp1 = Date.now();
                        else ultimoTimestamp2 = Date.now();
                        if (aviatorAtivo === num) {
                            atualizarVelaUI(num, 'ultima', dados);
                            atualizarGrafico();
                            renderizarCatalogo(arr);
                            renderizarHistoricoFiltrado();
                            atualizarStats(arr);
                            document.getElementById('totalCatalogo').textContent = arr.length + ' velas';
                        }
                    };
                })(n));
                evtSource.addEventListener('atualizar_ultimas_' + s, (function(num) {
                    return function(e) {
                        const dados = JSON.parse(e.data);
                        if (dados.length >= 2) {
                            if (aviatorAtivo === num) {
                                atualizarVelaUI(num, 'ultima', dados[dados.length - 1]);
                                atualizarVelaUI(num, 'penultima', dados[dados.length - 2]);
                            }
                        }
                    };
                })(n));
                evtSource.addEventListener('historico_' + s, (function(num) {
                    return function(e) {
                        const dados = JSON.parse(e.data);
                        if (num === 1) todasVelas1 = dados;
                        else todasVelas2 = dados;
                        if (aviatorAtivo === num) {
                            renderizarCatalogo(dados);
                            renderizarHistoricoFiltrado();
                            atualizarStats(dados);
                        }
                    };
                })(n));
                evtSource.addEventListener('estatisticas_' + s, (function(num) {
                    return function(e) {
                        const stats = JSON.parse(e.data);
                        if (aviatorAtivo !== num) return;
                        if (stats.porcentagens) {
                            document.getElementById('statAzul').textContent = stats.porcentagens.azul + '%';
                            document.getElementById('statRoxa').textContent = stats.porcentagens.roxa + '%';
                            document.getElementById('statRosa').textContent = stats.porcentagens.rosa + '%';
                        }
                        if (stats.total) {
                            document.getElementById('totalCatalogo').textContent = stats.total + ' velas';
                        }
                    };
                })(n));
            }

            evtSource.addEventListener('extensao_status', (e) => {
                const st = JSON.parse(e.data);
                const el = document.getElementById('extensaoStatus');
                if (!el) return;
                if (st.conectada) {
                    el.innerHTML = '📱 Extensão: <span style="color:#00e676">Conectada</span>';
                    el.title = 'Celular enviando dados em tempo real';
                } else {
                    el.innerHTML = '📱 Extensão: <span style="color:#ff5252">Offline</span>';
                }
            });
        }

        evtSource.onerror = () => {
            document.getElementById('statusDot').className = 'status-dot disconnected';
            document.getElementById('statusText').textContent = '🔴 Desconectado';
        };

        // ===== UI UPDATES =====
        function atualizarVelaUI(num, tipo, dados) {
            const isUltima = tipo === 'ultima';
            const prefix = isUltima ? 'ultima' : 'penultima';
            const cor = classificarCor(dados.multiplicador);
            const hex = CORES[cor].hex;
            document.getElementById(prefix + 'Rodada').textContent = 'Rodada ' + dados.rodada;
            const multEl = document.getElementById(prefix + 'Mult');
            multEl.textContent = dados.exibicao;
            multEl.style.color = hex;
            aplicarGlow(multEl, hex);
            document.getElementById(prefix + 'Soma').textContent = dados.soma || calcularSoma(dados.multiplicador);
        }

        function atualizarStats(velas) {
            let azul = 0, roxa = 0, rosa = 0;
            velas.forEach(v => {
                const cor = classificarCor(v.multiplicador);
                if (cor === 'azul') azul++;
                else if (cor === 'roxa') roxa++;
                else rosa++;
            });
            const total = velas.length || 1;
            document.getElementById('statAzul').textContent = (azul / total * 100).toFixed(1) + '%';
            document.getElementById('statRoxa').textContent = (roxa / total * 100).toFixed(1) + '%';
            document.getElementById('statRosa').textContent = (rosa / total * 100).toFixed(1) + '%';
        }

        function renderizarCatalogo(velas) {
            const grid = document.getElementById('catalogoGrid');
            const ultimas20 = velas.slice(-20);
            grid.innerHTML = ultimas20.map(v => {
                const cor = classificarCor(v.multiplicador);
                const hex = CORES[cor].hex;
                const soma = v.soma || calcularSoma(v.multiplicador);
                return '<div class="vela-mini" style="border-color: ' + hex + '40;">' +
                    '<span class="mult" style="color: ' + hex + '">' + v.exibicao + '</span>' +
                    '<span class="rodada">#' + v.rodada + '</span>' +
                    '<span class="soma-tag" style="color: ' + hex + '80">+' + soma + '</span>' +
                '</div>';
            }).join('');
        }

        function renderizarHistoricoFiltrado() {
            const grid = document.getElementById('historicoGrid');
            const velas = getVelasAtivas();
            let velasFiltradas = filtroAtivo === 'todas' ? [...velas] : velas.filter(v => classificarCor(v.multiplicador) === filtroAtivo);
            velasFiltradas = velasFiltradas.reverse();
            grid.innerHTML = velasFiltradas.map(v => {
                const cor = classificarCor(v.multiplicador);
                const hex = CORES[cor].hex;
                const soma = v.soma || calcularSoma(v.multiplicador);
                return '<div class="vela-historico" style="border-color: ' + hex + '40;" onclick="selecionarVela(this, \'' + cor + '\')">' +
                    '<span class="mult-h" style="color: ' + hex + '">' + v.exibicao + '</span>' +
                    '<span class="rodada-h">#' + v.rodada + '</span>' +
                    '<span class="soma-h" style="color: ' + hex + '">Soma: ' + soma + '</span>' +
                '</div>';
            }).join('');
            document.getElementById('contagemHistorico').textContent =
                velasFiltradas.length + ' velas ' + (filtroAtivo !== 'todas' ? '(' + filtroAtivo + ')' : '(todas)');
        }

        function selecionarVela(el, cor) {
            document.querySelectorAll('.vela-historico').forEach(v => v.classList.remove('selecionada'));
            document.querySelectorAll('.vela-historico').forEach(v => {
                const corVela = classificarCor(parseFloat(v.querySelector('.mult-h').textContent));
                if (corVela === cor) v.classList.add('selecionada');
            });
        }

        function filtrar(filtro) {
            filtroAtivo = filtro;
            document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
            document.querySelector('.filtro-btn.' + filtro).classList.add('ativo');
            renderizarHistoricoFiltrado();
            if (filtro !== 'todas') {
                fetch('/api/' + aviatorAtivo + '/historico/' + filtro).then(r => r.json()).then(d => {
                    if (aviatorAtivo === 1) todasVelas1 = d;
                    else todasVelas2 = d;
                    renderizarHistoricoFiltrado();
                });
            }
        }

        function renderizarTudo() {
            const velas = getVelasAtivas();
            renderizarCatalogo(velas);
            renderizarHistoricoFiltrado();
            atualizarStats(velas);
            document.getElementById('totalCatalogo').textContent = velas.length + ' velas';
            if (velas.length > 0) {
                atualizarVelaUI(aviatorAtivo, 'ultima', velas[velas.length - 1]);
                if (velas.length >= 2) atualizarVelaUI(aviatorAtivo, 'penultima', velas[velas.length - 2]);
            }
            atualizarGrafico();
        }

        // ===== GRÁFICO =====
        function criarGrafico(id, canvasId) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Multiplicador',
                        data: [],
                        borderColor: '#913EF8',
                        backgroundColor: 'rgba(145, 62, 248, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3,
                        pointBackgroundColor: '#913EF8',
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {
                            ticks: { color: '#666', maxTicksLimit: 10, font: { size: 10 } },
                            grid: { color: 'rgba(255,255,255,0.03)' }
                        },
                        y: {
                            ticks: { color: '#666', font: { size: 10 } },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            beginAtZero: false
                        }
                    }
                }
            });
        }

        function atualizarGrafico() {
            const velas = getVelasAtivas();
            const chart = getChartAtivo();
            if (!chart) return;
            const ultimas30 = velas.slice(-30);
            chart.data.labels = ultimas30.map(v => v.rodada.toString().slice(-4));
            chart.data.datasets[0].data = ultimas30.map(v => v.multiplicador);
            chart.data.datasets[0].pointBackgroundColor = ultimas30.map(v => CORES[classificarCor(v.multiplicador)].hex);
            chart.update('none');
        }

        // ===== TIMER =====
        function iniciarTimer() {
            setInterval(() => {
                const agora = Date.now();
                const ts = aviatorAtivo === 1 ? ultimoTimestamp1 : ultimoTimestamp2;
                const passou = Math.floor((agora - ts) / 1000);
                const restante = Math.max(0, 12 - passou);
                const el = document.getElementById('timerTexto');
                if (restante > 0 && passou > 1) {
                    el.textContent = restante + 's';
                    el.className = 'timer-num' + (restante <= 3 ? ' urgente' : '');
                } else if (passou <= 1) {
                    el.textContent = '⚡AGORA!';
                    el.className = 'timer-num';
                } else {
                    el.textContent = '--';
                    el.className = 'timer-num';
                }
            }, 500);
        }

        // ===== SCROLL TO TOP =====
        window.onscroll = function() {
            const btn = document.getElementById('scrollTopBtn');
            btn.style.display = window.scrollY > 300 ? 'flex' : 'none';
        };

        // ===== INICIALIZAÇÃO =====
        document.addEventListener('DOMContentLoaded', () => {
            chart1 = criarGrafico(1, 'aviatorChart1');
            chart2 = criarGrafico(2, 'aviatorChart2');
            configurarSSE();
            iniciarTimer();

            setTimeout(() => {
                fetch('/api/1/historico').then(r => r.json()).then(d => {
                    todasVelas1 = d;
                    if (aviatorAtivo === 1) renderizarTudo();
                });
                fetch('/api/2/historico').then(r => r.json()).then(d => {
                    todasVelas2 = d;
                    if (aviatorAtivo === 2) renderizarTudo();
                });
            }, 1000);
        });
    </script>
</body>
</html>
